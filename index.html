<!DOCTYPE html>
<html>
<head>
  <title>CRUD Siswa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: #e2e8f0;
      padding: 20px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(56,189,248,0.15), transparent 60%);
      z-index: -1;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      background: #1f2937;
      color: white;
    }

    input:focus {
      box-shadow: 0 0 5px #38bdf8;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .search {
      width: 100%;
      margin-top: 10px;
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 10px;
    }

    th {
      background: #0ea5e9;
      padding: 12px;
      text-align: left;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #1f2937;
    }

    tr:hover {
      background: #1e293b;
    }

    /* kolom aksi di kanan */
    .aksi {
      text-align: right;
    }

    .aksi button {
      margin-left: 5px;
    }

    .rata {
      margin-top: 15px;
      text-align: right;
      color: #38bdf8;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>CRUD Siswa By Dimas Zaky Ibrahim</h1>

  <!-- FORM -->
  <input type="text" id="nama" placeholder="Nama">
  <input type="text" id="kelas" placeholder="Kelas">
  <input type="number" id="nilai" placeholder="Nilai (0-100)">
  <button onclick="simpan()">Simpan</button>

  <!-- SEARCH -->
  <input class="search" type="text" id="search" placeholder="🔍 Cari nama..." onkeyup="tampil()">

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>Nama</th>
        <th>Kelas</th>
        <th>Nilai</th>
        <th class="aksi">Aksi</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

  <div class="rata" id="rata"></div>
</div>

<script>
let siswa = JSON.parse(localStorage.getItem("siswa")) || [];
let indexEdit = null;

function tampil() {
  const body = document.getElementById("data");
  const keyword = document.getElementById("search").value.toLowerCase();
  body.innerHTML = "";

  let total = 0;
  let jumlah = 0;

  siswa.forEach((s, i) => {
    if (s.nama.toLowerCase().includes(keyword)) {
      body.innerHTML += `
        <tr>
          <td>${s.nama}</td>
          <td>${s.kelas}</td>
          <td>${s.nilai}</td>
          <td class="aksi">
            <button onclick="edit(${i})">Edit</button>
            <button onclick="hapus(${i})">Hapus</button>
          </td>
        </tr>
      `;

      total += Number(s.nilai);
      jumlah++;
    }
  });

  let rata = jumlah ? (total / jumlah).toFixed(2) : 0;
  document.getElementById("rata").innerText = "Rata-rata Nilai: " + rata;

  localStorage.setItem("siswa", JSON.stringify(siswa));
}

function simpan() {
  const nama = document.getElementById("nama").value;
  const kelas = document.getElementById("kelas").value;
  const nilai = document.getElementById("nilai").value;

  if (nama === "" || kelas === "" || nilai === "") {
    alert("Semua data wajib diisi");
    return;
  }

  if (nilai < 0 || nilai > 100) {
    alert("Nilai harus antara 0 - 100");
    return;
  }

  if (indexEdit === null) {
    siswa.push({ nama, kelas, nilai });
  } else {
    siswa[indexEdit] = { nama, kelas, nilai };
    indexEdit = null;
  }

  document.getElementById("nama").value = "";
  document.getElementById("kelas").value = "";
  document.getElementById("nilai").value = "";

  tampil();
}

function edit(i) {
  document.getElementById("nama").value = siswa[i].nama;
  document.getElementById("kelas").value = siswa[i].kelas;
  document.getElementById("nilai").value = siswa[i].nilai;
  indexEdit = i;
}

function hapus(i) {
  if (confirm("Hapus data ini?")) {
    siswa.splice(i, 1);
    tampil();
  }
}

tampil();
</script>

</body>
</html>
